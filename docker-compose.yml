services:
  # 1. Mise à jour du service API existant
  api:
    build:
      context: ./backend
      target: development
    volumes:
      - sqlite_data:/usr/src/app/data
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - app-net

  # 2. Ajout du nouveau service Frontend
  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - api
    networks:
      - app-net

  # 3. Ajout du Reverse Proxy Global
  reverse-proxy:
    image: nginx:alpine
    ports:
      - "8042:8042"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  sqlite_data:
    # Inchangé