services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: offers_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d offers_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-net

  api:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DATABASE_URL: postgres://admin:securepassword@database:5432/offers_db
      JWT_SECRET: super_secret_cryptographic_key_32_bytes_min
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - api
    networks:
      - app-net

  reverse-proxy:
    image: nginx:alpine
    ports:
      - "8042:8042"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  pg_data:
