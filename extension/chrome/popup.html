<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; }
    form { display: flex; flex-direction: column; gap: 10px; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px; background: #00babc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #status { margin-top: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <div id="app-root">
    <!-- Implémentation statique, substituable par le rendu React -->
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
    </form>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
